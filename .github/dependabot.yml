version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
      include: scope
    labels:
      - dependencies
      - ci
    # Actions in this repo are pinned to full commit SHAs (with a tag
    # comment), per supply-chain hardening practice. Dependabot understands
    # this and bumps both the SHA and the trailing version comment in one
    # PR; no additional config is needed for that to work.
    # Group every action bump (major, minor, patch) into one PR per cycle.
    # Reduces churn: one CI run, one merge click. Majors aren't auto-
    # separated because the project's own CI is the safety net -- a
    # breaking action change fails one of the 18 jobs.
    groups:
      github-actions:
        patterns:
          - "*"
