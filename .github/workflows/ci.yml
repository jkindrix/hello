name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang, msvc]
        preset: [debug, release]
        exclude:
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
          - os: macos-latest
            compiler: gcc
          - os: macos-latest
            compiler: msvc
          - os: ubuntu-latest
            compiler: msvc

    steps:
      - uses: actions/checkout@v6

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure compiler (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install clang + sanitizer runtimes
        # libclang-rt-dev is normally pulled by clang via Recommends, but
        # making the dependency explicit insulates us from runner-image
        # changes that disable Recommends or repackage the metapackages.
        run: sudo apt-get update && sudo apt-get install -y clang libclang-rt-dev
      - run: cmake --preset asan
        env:
          CC: clang
      - run: cmake --build --preset asan
      - run: ctest --preset asan
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  msan:
    name: MemorySanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install clang + sanitizer runtimes
        # libclang-rt-dev is normally pulled by clang via Recommends, but
        # making the dependency explicit insulates us from runner-image
        # changes that disable Recommends or repackage the metapackages.
        run: sudo apt-get update && sudo apt-get install -y clang libclang-rt-dev
      - name: Configure
        env:
          CC: clang
        run: cmake -S . -B build/msan -G Ninja
                   -DCMAKE_BUILD_TYPE=Debug
                   -DHELLO_ENABLE_MSAN=ON
      - name: Build
        run: cmake --build build/msan
      - name: Test
        # MSan environment is baked into the test properties; do not also set
        # MSAN_OPTIONS here or we'd be re-asserting the same surface in two
        # places (the thing we just fixed by baking it in).
        run: ctest --test-dir build/msan --output-on-failure

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install clang + sanitizer runtimes
        # libclang-rt-dev is normally pulled by clang via Recommends, but
        # making the dependency explicit insulates us from runner-image
        # changes that disable Recommends or repackage the metapackages.
        run: sudo apt-get update && sudo apt-get install -y clang libclang-rt-dev
      - run: cmake --preset tsan
        env:
          CC: clang
      - run: cmake --build --preset tsan
      - run: ctest --test-dir build/tsan --output-on-failure
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1

  lint:
    name: clang-format + clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy ninja-build
      - name: clang-format (check)
        run: |
          find include src tests examples -name '*.c' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror
      - name: Configure
        run: cmake --preset debug
      - name: clang-tidy
        # --extra-arg-before=-Wno-unknown-warning-option silences clang-tidy's
        # objection to GCC-only flags (-Wduplicated-cond, -Wlogical-op, ...)
        # that may be present in compile_commands.json when GCC configured
        # the build.
        run: |
          find src tests examples -name '*.c' \
            | xargs clang-tidy -p build/debug \
                --extra-arg-before=-Wno-unknown-warning-option \
                --warnings-as-errors=*

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - run: cmake --preset coverage
      - run: cmake --build --preset coverage
      - run: ctest --test-dir build/coverage --output-on-failure
      - name: Collect + enforce coverage
        # Delegates to scripts/coverage.sh so the lcov flag surface (which
        # differs between lcov 1.x and 2.x) is defined in exactly one place
        # and contributors running locally see the same logic CI uses.
        env:
          MIN_LINE_COVERAGE: '90'
        run: scripts/coverage.sh build/coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/coverage/coverage.info

  shared-build:
    name: Shared library + symbol-export check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Configure shared
        run: cmake -S . -B build/shared -G Ninja
                   -DBUILD_SHARED_LIBS=ON
                   -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/shared
      - name: Test (includes symbol_export_check)
        run: ctest --test-dir build/shared --output-on-failure

  install-consumer:
    name: Install + downstream find_package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Configure + build hello
        run: |
          cmake --preset release
          cmake --build --preset release
      - name: Install to staging prefix
        run: cmake --install build/release --prefix "$RUNNER_TEMP/prefix"
      - name: Verify pkg-config metadata
        run: |
          PKG_CONFIG_PATH="$RUNNER_TEMP/prefix/lib/pkgconfig" pkg-config --modversion hello
          PKG_CONFIG_PATH="$RUNNER_TEMP/prefix/lib/pkgconfig" pkg-config --cflags --libs hello
      - name: Build downstream consumer
        run: |
          cmake -S tests/consumer -B "$RUNNER_TEMP/consumer-build" -G Ninja \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/prefix"
          cmake --build "$RUNNER_TEMP/consumer-build"
      - name: Run downstream consumer tests
        run: ctest --test-dir "$RUNNER_TEMP/consumer-build" --output-on-failure

  fuzz:
    name: libFuzzer smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install clang + sanitizer runtimes
        # libclang-rt-dev is normally pulled by clang via Recommends, but
        # making the dependency explicit insulates us from runner-image
        # changes that disable Recommends or repackage the metapackages.
        run: sudo apt-get update && sudo apt-get install -y clang libclang-rt-dev
      - name: Configure with fuzzers
        env:
          CC: clang
        run: cmake -S . -B build/fuzz -G Ninja -DCMAKE_BUILD_TYPE=Debug -DHELLO_BUILD_FUZZERS=ON
      - name: Build fuzz targets
        run: cmake --build build/fuzz --target fuzz_format fuzz_greet
      - name: Run fuzz_format (with seed corpus + dictionary)
        run: |
          ./build/fuzz/tests/fuzz/fuzz_format tests/fuzz/corpus \
              -dict=tests/fuzz/hello.dict \
              -max_total_time=20 \
              -print_final_stats=1
      - name: Run fuzz_greet (same corpus + dictionary, streaming path)
        run: |
          ./build/fuzz/tests/fuzz/fuzz_greet tests/fuzz/corpus \
              -dict=tests/fuzz/hello.dict \
              -max_total_time=20 \
              -print_final_stats=1

  docs:
    name: Doxygen
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Build docs
        run: doxygen docs/Doxyfile
      - uses: actions/upload-artifact@v7
        with:
          name: api-docs
          path: docs/html

  # Separate from `docs` so PR builds don't carry pages:write / id-token:write
  # permissions and don't show an empty Pages URL in their job summary. The
  # build is duplicated rather than passed via artifact because doxygen on this
  # codebase runs in well under 10 seconds, and a clean rebuild is simpler than
  # plumbing actions/download-artifact between jobs.
  pages:
    name: Deploy Doxygen to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Build docs
        run: doxygen docs/Doxyfile
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
