name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gcc, clang, msvc]
        preset: [debug, release]
        exclude:
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
          - os: macos-latest
            compiler: gcc
          - os: macos-latest
            compiler: msvc
          - os: ubuntu-latest
            compiler: msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure compiler (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - run: cmake --preset asan
        env:
          CC: clang
      - run: cmake --build --preset asan
      - run: ctest --preset asan
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  lint:
    name: clang-format + clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy ninja-build
      - name: clang-format (check)
        run: |
          find include src tests examples -name '*.c' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror
      - name: Configure
        run: cmake --preset debug
      - name: clang-tidy
        run: |
          find src tests examples -name '*.c' \
            | xargs clang-tidy -p build/debug --warnings-as-errors=*

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - run: cmake --preset coverage
      - run: cmake --build --preset coverage
      - run: ctest --test-dir build/coverage --output-on-failure
      - name: Collect coverage
        run: |
          lcov --capture --directory build/coverage --output-file coverage.info \
               --rc lcov_branch_coverage=1
          lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info
          lcov --list coverage.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

  install-consumer:
    name: Install + downstream find_package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Configure + build hello
        run: |
          cmake --preset release
          cmake --build --preset release
      - name: Install to staging prefix
        run: cmake --install build/release --prefix "$RUNNER_TEMP/prefix"
      - name: Verify pkg-config metadata
        run: |
          PKG_CONFIG_PATH="$RUNNER_TEMP/prefix/lib/pkgconfig" pkg-config --modversion hello
          PKG_CONFIG_PATH="$RUNNER_TEMP/prefix/lib/pkgconfig" pkg-config --cflags --libs hello
      - name: Build downstream consumer
        run: |
          cmake -S tests/consumer -B "$RUNNER_TEMP/consumer-build" -G Ninja \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/prefix"
          cmake --build "$RUNNER_TEMP/consumer-build"
      - name: Run downstream consumer tests
        run: ctest --test-dir "$RUNNER_TEMP/consumer-build" --output-on-failure

  fuzz:
    name: libFuzzer smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Configure with fuzzers
        env:
          CC: clang
        run: cmake -S . -B build/fuzz -G Ninja -DCMAKE_BUILD_TYPE=Debug -DHELLO_BUILD_FUZZERS=ON
      - name: Build fuzz target
        run: cmake --build build/fuzz --target fuzz_format
      - name: Run fuzzer briefly
        run: ./build/fuzz/tests/fuzz/fuzz_format -max_total_time=20 -print_final_stats=1

  docs:
    name: Doxygen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Build docs
        run: doxygen docs/Doxyfile
      - uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/html
