name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly-published queries catch regressions in dormant code.
    - cron: '23 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # ninja is preinstalled on all GitHub-hosted runners; no setup step needed.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4
        with:
          languages: c
          # `manual` makes the CMake build step below the source of truth for
          # what CodeQL analyzes. Leaving build-mode unset triggers a
          # "build-mode is set to 'undefined'" warning and falls back to a
          # legacy full-database build that's slower and less precise.
          build-mode: manual
          queries: security-and-quality

      # -Werror is intentionally disabled here. The point of this job is the
      # CodeQL analyzer findings, not the warning gate (that is the lint job's
      # responsibility). If a future CodeQL instrumentation pass produces a
      # benign warning, we still want the analysis to complete.
      - name: Build
        run: |
          cmake -S . -B build/codeql -G Ninja \
                -DCMAKE_BUILD_TYPE=Debug \
                -DHELLO_WARNINGS_AS_ERRORS=OFF
          cmake --build build/codeql -j

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4
        with:
          category: "/language:c"
